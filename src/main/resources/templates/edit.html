<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Edit Expense</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-dark">

<div class="container mt-5">

    <div class="card p-4">

        <h2 class="mb-4">Edit Expense</h2>

        <form action="/update" method="post">

            <input type="hidden"
                   name="id"
                   th:value="${expense.id}">

            <div class="mb-3">

                <label>Name</label>

                <input type="text"
                       name="title"
                       class="form-control"
                       th:value="${expense.title}">

            </div>

            <div class="mb-3">

                <label>Category</label>

                <input type="text"
                       name="category"
                       class="form-control"
                       th:value="${expense.category}">

            </div>

            <div class="mb-3">

                <label>Amount</label>

                <input type="number"
                       step="0.01"
                       name="amount"
                       class="form-control"
                       th:value="${expense.amount}">

            </div>

            <div class="mb-3">

                <label>Date</label>

                <input type="date"
                       name="expenseDate"
                       class="form-control"
                       th:value="${expense.expenseDate}">

            </div>

            <button class="btn btn-success">
                Update
            </button>

            <a href="/"
               class="btn btn-secondary">
                Back
            </a>

        </form>

    </div>

</div>

</body>

</html>
