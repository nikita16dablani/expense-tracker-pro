<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Expense Tracker Pro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body{
            background: linear-gradient(135deg,#020617,#0f172a,#1e293b);
            min-height:100vh;
            color:white;
        }

        .dashboard-title{
            font-size:3rem;
            font-weight:bold;
        }

        .glass-card{
            background: rgba(255,255,255,0.10);
            backdrop-filter: blur(15px);
            border:1px solid rgba(255,255,255,0.15);
            border-radius:20px;
            color:white;
        }

        .form-card{
            background:white;
            border-radius:20px;
            padding:25px;
        }

        .table-card{
    background:white;
    border-radius:20px;
    overflow:hidden;
    margin-top:20px;
}

        .amount{
            font-size:2rem;
            font-weight:bold;
        }

       .chart-card{
    background:white;
    border-radius:20px;
    padding:30px;
    color:black;
}

        .table th{
            background:#0f172a;
            color:white;
        }

        canvas{
    max-width:250px;
    max-height:250px;
    margin:auto;
}

    </style>

</head>

<body>

<div class="container py-5">

    <h1 class="text-center dashboard-title mb-5">
        💰 Expense Tracker Pro
    </h1>

    <!-- DASHBOARD CARDS -->

    <div class="row g-4 mb-4">

        <div class="col-md-6">

            <div class="glass-card p-4 shadow">

                <div class="d-flex justify-content-between">

                    <div>

                        <h5>Total Expense</h5>

                        <div class="amount">
                            ₹ <span th:text="${totalExpense}"></span>
                        </div>

                    </div>

                    <i class="fa-solid fa-wallet fa-3x"></i>

                </div>

            </div>

        </div>

        <div class="col-md-6">

            <div class="glass-card p-4 shadow">

                <div class="d-flex justify-content-between">

                    <div>

                        <h5>Total Transactions</h5>

                        <div class="amount">
                            <span th:text="${totalTransactions}"></span>
                        </div>

                    </div>

                    <i class="fa-solid fa-chart-line fa-3x"></i>

                </div>

            </div>

        </div>

    </div>

    <!-- ADD EXPENSE -->

    <div class="form-card shadow mb-4">

        <form action="/save" method="post">

            <div class="row g-3">

                <div class="col-md-3">

                    <input
                            type="text"
                            name="title"
                            class="form-control"
                            placeholder="Expense Name"
                            required>

                </div>

                <div class="col-md-3">

                    <select
                            name="category"
                            class="form-select">

                        <option>Food</option>
                        <option>Travel</option>
                        <option>Shopping</option>
                        <option>Bills</option>
                        <option>Entertainment</option>
                        <option>Health</option>
                        <option>Other</option>

                    </select>

                </div>

                <div class="col-md-3">

                    <input
                            type="number"
                            step="0.01"
                            name="amount"
                            class="form-control"
                            placeholder="Amount"
                            required>

                </div>

                <div class="col-md-2">

                    <input
                            type="date"
                            name="expenseDate"
                            class="form-control"
                            required>

                </div>

                <div class="col-md-1">

                    <button
                            class="btn btn-primary w-100">

                        +

                    </button>

                </div>

            </div>

        </form>

    </div>

    <!-- SEARCH -->

    <div class="form-card shadow mb-4">

        <form action="/search" method="get">

            <div class="row">

                <div class="col-md-10">

                    <select
                            name="category"
                            class="form-select">

                        <option value="">
                            All Categories
                        </option>

                        <option>Food</option>
                        <option>Travel</option>
                        <option>Shopping</option>
                        <option>Bills</option>
                        <option>Entertainment</option>
                        <option>Health</option>
                        <option>Other</option>

                    </select>

                </div>

                <div class="col-md-2">

                    <button
                            class="btn btn-success w-100">

                        Search

                    </button>

                </div>

            </div>

        </form>

    </div>

  


    
    <!-- TABLE -->

    <div class="table-card shadow">

        <table class="table table-hover">

            <thead>

            <tr>

                <th>Name</th>
                <th>Category</th>
                <th>Amount</th>
                <th>Date</th>
                <th>Action</th>

            </tr>

            </thead>

            <tbody>

            <tr th:each="expense : ${expenses}">

                <td th:text="${expense.title}"></td>

                <td th:text="${expense.category}"></td>

                <td>
                    ₹ <span th:text="${expense.amount}"></span>
                </td>

                <td th:text="${expense.expenseDate}"></td>

                <td>

                    <a
                            th:href="@{/edit/{id}(id=${expense.id})}"
                            class="btn btn-warning btn-sm">

                        Edit

                    </a>

                    <a
                            th:href="@{/delete/{id}(id=${expense.id})}"
                            class="btn btn-danger btn-sm">

                        Delete

                    </a>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>



</body>

</html>
